services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ..:/home/project
    environment:
      - JAVA_OPTS=-Dfile.encoding=UTF-8

volumes:
  jenkins_home:
